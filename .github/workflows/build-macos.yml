name: Build macOS DMGs

on:
  workflow_dispatch:

jobs:
  build:
    name: Build ${{ matrix.target }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15
            target: arm64
            python_arch: arm64
          - runner: macos-15-intel
            target: x86_64
            python_arch: x64

    runs-on: ${{ matrix.runner }}
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          architecture: ${{ matrix.python_arch }}
          cache: pip

      - name: Run regression tests
        shell: bash
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python tests/test_core.py
          QT_QPA_PLATFORM=offscreen python tests/test_canvas.py

      - name: Build app and DMG
        shell: bash
        env:
          TARGET_ARCH: ${{ matrix.target }}
          PYTHON_BIN: python
        run: |
          chmod +x build_macos.sh
          ./build_macos.sh

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: FilmStripCutter-macOS-${{ matrix.target }}
          path: dist/FilmStripCutter-macOS-${{ matrix.target }}.dmg
          if-no-files-found: error
          retention-days: 30
